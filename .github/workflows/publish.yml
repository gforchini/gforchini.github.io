on:
  workflow_dispatch:
  push:
    branches: main

name: Quarto Publish

env:
  # Optional: opt-in to Node 24 for JS-based actions now (warning-free)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v5  # Node 24–ready
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.5.2'       # any recent release is fine
      # Install the R packages your .qmd files use
      - name: Install R packages for rendering
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          # List packages explicitly (add others you use)
          packages: |
            any::knitr
            any::rmarkdown
            any::ggplot2
            # any::tidyverse
            # any::dplyr
            # any::readr
            # any::<add others here>

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render and Publish
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}